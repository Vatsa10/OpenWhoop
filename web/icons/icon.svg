<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- OLED-black backdrop with a faint top-light -->
    <radialGradient id="bg" cx="50%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#15161C"/>
      <stop offset="55%" stop-color="#0B0C11"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>

    <!-- Ambient mesh orbs -->
    <radialGradient id="orbGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#16EC06" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#16EC06" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="recArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DFF52"/>
      <stop offset="100%" stop-color="#0A9E0E"/>
    </linearGradient>
    <linearGradient id="strainArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5CE3FF"/>
      <stop offset="100%" stop-color="#0386F3"/>
    </linearGradient>
    <linearGradient id="sleepArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9FB4FF"/>
      <stop offset="100%" stop-color="#4D6BFF"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle background (iOS masks corners; explicit for everyone else) -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <circle cx="320" cy="300" r="380" fill="url(#orbGreen)"/>
  <circle cx="730" cy="760" r="360" fill="url(#orbCyan)"/>

  <!-- Inner hairline bezel -->
  <rect x="6" y="6" width="1012" height="1012" rx="222" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Concentric WHOOP-style rings, ~290° gauge arcs opening at bottom -->
  <g transform="translate(512, 512)" filter="url(#glow)" fill="none" stroke-linecap="round">
    <!-- track ghosts -->
    <g stroke="#FFFFFF" stroke-opacity="0.05">
      <path d="M -227 160 A 278 278 0 1 1 227 160" stroke-width="60"/>
      <path d="M -161 113 A 197 197 0 1 1 161 113" stroke-width="52"/>
      <path d="M -97 68 A 119 119 0 1 1 97 68" stroke-width="42"/>
    </g>
    <!-- live arcs -->
    <path d="M -227 160 A 278 278 0 1 1 227 160" stroke="url(#recArc)" stroke-width="60"/>
    <path d="M -161 113 A 197 197 0 1 1 161 113" stroke="url(#strainArc)" stroke-width="52"/>
    <path d="M -97 68 A 119 119 0 1 1 97 68" stroke="url(#sleepArc)" stroke-width="42"/>
  </g>

  <!-- Center pulse -->
  <circle cx="512" cy="512" r="20" fill="#FFFFFF" opacity="0.95" filter="url(#glow)"/>
</svg>
